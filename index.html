<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>岛屿保卫战 3D</title>
    <script>
      if (location.protocol !== "file:" && !location.pathname.endsWith("/") && !location.pathname.split("/").pop().includes(".")) {
        location.replace(`${location.pathname}/${location.search}${location.hash}`);
      }
    </script>
    <link rel="stylesheet" href="./styles.css?v=default-audio-20260513a" />
  </head>
  <body>
    <main id="app">
      <canvas id="world" aria-label="岛屿保卫战 3D 游戏画面"></canvas>

      <section class="topbar" aria-label="游戏状态">
        <div class="meter dev-meter"><span>FPS</span><b id="fps">--</b></div>
        <div class="meter"><span>关卡</span><b id="level">1</b></div>
        <div class="meter meter--heart"><span>生命</span><b id="coreHp">15</b></div>
        <div class="resource"><span class="res-chip res-chip--star"></span><b id="stars">250</b><small>星币</small></div>
        <div class="meter meter--learn"><span>练习</span><b id="learningEnergy">0%</b></div>
        <div class="meter"><span>时间</span><b id="timer">80</b></div>
        <div class="meter"><span>精灵</span><b id="sprites">0</b></div>
      </section>

      <section class="wave-card" aria-label="怪物波次">
        <b id="mpm">0</b>
        <span>怪物 <mark>来袭速度</mark></span>
      </section>

      <section class="utility-row" aria-label="快捷技能">
        <button id="lightningBtn" title="闪电技能">⚡</button>
        <button id="attackBtn" title="队长攻击">攻</button>
        <button id="waveBtn" title="立即开怪">▶</button>
        <button id="quizBtn" title="学习挑战">问</button>
        <button id="audioBtn" title="关闭音乐和音效" aria-pressed="true">♫</button>
      </section>

      <p class="wave-warn" id="waveWarn">第一波怪物准备中</p>

      <section id="joystick" class="joystick" aria-label="移动摇杆">
        <span class="joystick__stick"></span>
      </section>

      <aside class="designer game-build-panel" aria-label="建造菜单">
        <div class="designer__head">
          <div>
            <p>岛屿保卫战</p>
            <h1>建造菜单</h1>
          </div>
          <span>先选炮台，再点岛上</span>
        </div>

        <label class="field-label" for="partLabel">当前选择</label>
        <div class="preview-card">
          <div id="miniPreview" class="mini-preview" aria-hidden="true"></div>
          <b id="selectedName">电炮台</b>
          <span id="selectedDesc">快速射击 · 70 星币</span>
        </div>

        <div class="building-row" role="listbox" aria-label="炮台选择">
          <button class="preset" data-preset="spark">
            <span class="preset-icon preset-icon--spark"></span>
            <b>电炮台</b>
            <small>快射 · 70</small>
          </button>
          <button class="preset" data-preset="frost">
            <span class="preset-icon preset-icon--frost"></span>
            <b>寒冰塔</b>
            <small>减速 · 95</small>
          </button>
          <button class="preset" data-preset="wall">
            <span class="preset-icon preset-icon--wall"></span>
            <b>藤蔓陷阱</b>
            <small>减速 · 45</small>
          </button>
          <button class="preset preset--locked" data-preset="cookie">
            <span class="preset-icon preset-icon--cookie"></span>
            <b>饼干炮</b>
            <small>第 4 关解锁</small>
          </button>
        </div>

        <div class="part-grid hidden-editor-controls" aria-label="隐藏部件控制">
          <button class="part is-active" data-part="base">BASE</button>
          <button class="part is-active" data-part="core">CORE</button>
          <button class="part is-active" data-part="barrel">BARREL</button>
          <button class="part is-active" data-part="coil">COIL</button>
          <button class="part is-active" data-part="crystal">CRYSTAL</button>
          <button class="part" data-part="aura">AURA</button>
        </div>

        <button id="commitBuilding" class="commit">放置</button>

        <p class="kid-tip">选一个炮台，点岛上的空地放下。糖果打破会变成小精灵，帮你一起守岛。</p>

        <div class="property-grid hidden-editor-controls">
          <label>
            <span>Part label</span>
            <input id="partLabel" value="Base" />
          </label>
          <label>
            <span>Cost</span>
            <input id="towerCost" value="70 stars" readonly />
          </label>
        </div>

        <label class="field-label hidden-editor-controls">Custom color</label>
        <input id="customColor" class="color-input hidden-editor-controls" value="#27b7ff" />

        <div class="palette hidden-editor-controls" aria-label="调色板">
          <button class="swatch is-active" data-color="#27b7ff" style="--swatch: #27b7ff"></button>
          <button class="swatch" data-color="#80d7ff" style="--swatch: #80d7ff"></button>
          <button class="swatch" data-color="#f6cf4c" style="--swatch: #f6cf4c"></button>
          <button class="swatch" data-color="#ff8f5f" style="--swatch: #ff8f5f"></button>
          <button class="swatch" data-color="#98e16f" style="--swatch: #98e16f"></button>
          <button class="swatch" data-color="#e9eef7" style="--swatch: #e9eef7"></button>
        </div>
      </aside>

      <section class="command-bar" aria-label="游戏提示">
        <span id="statusText">右侧选炮台，点草地、沙滩或浅海建造；点炮台升级或回收。</span>
      </section>

      <section id="towerMenu" class="tower-menu" hidden>
        <button id="towerMenuUpgrade">升级</button>
        <button id="towerMenuSell">回收</button>
      </section>

      <section id="quizOverlay" class="quiz-overlay" aria-label="学习挑战" hidden>
        <div class="quiz-card">
          <p>能量练习</p>
          <h2 id="quizTitle">答对 5 题，给生命补能量</h2>
          <div id="quizProgress" class="quiz-progress">1 / 5</div>
          <h3 id="quizQuestion">3 + 4 = ?</h3>
          <div id="quizChoices" class="quiz-choices"></div>
          <button id="quizClose" class="quiet-button">先回战场</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/three-game.js?v=default-audio-20260513a"></script>
  </body>
</html>
