<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>星愿海岛乐园守护</title>
    <script>
      if (location.protocol === "file:") {
        location.replace("http://127.0.0.1:8020/");
      }
    </script>
    <link rel="stylesheet" href="./park.css?v=park-3d-20260518-monsters-2" />
  </head>
  <body>
    <main id="app">
      <img
        id="paintedScene"
        src="./assets/park/starwish-overview-map.png"
        alt=""
        aria-hidden="true"
      />
      <canvas id="world" aria-label="星愿海岛乐园守护 3D 游戏"></canvas>
      <section id="paintedMapLayer" aria-label="可交互乐园地图"></section>
      <canvas id="minimap" width="180" height="180" aria-label="小地图"></canvas>

      <section class="hud hud--top" aria-label="状态">
        <div class="brand">
          <span class="brand__mark"></span>
          <div>
            <b>星愿海岛乐园</b>
            <small id="modeLabel">守护视角</small>
          </div>
        </div>
        <div class="chip chip--hp"><span></span><small>城堡能量</small><b id="hp">100</b></div>
        <div class="chip chip--coin"><span></span><small>星币</small><b id="coins">260</b></div>
        <div class="chip chip--learn"><span></span><small>学习能量</small><b id="learn">0%</b></div>
        <div class="chip"><span></span><small>来袭强度</small><b id="threat">1</b></div>
      </section>

      <section class="hud hud--actions" aria-label="快捷操作">
        <button id="viewBtn" class="icon-btn" title="切换守护视角和第一人称" aria-label="切换视角">
          <span class="action-icon action-icon--camera"></span>
        </button>
      </section>

      <section class="action-pad" aria-label="操作">
        <button id="attackBtn" class="icon-btn" title="星杖攻击" aria-label="星杖攻击">
          <span class="action-icon action-icon--wand"></span>
        </button>
        <button id="skillBtn" class="icon-btn" title="城堡闪电" aria-label="城堡闪电">
          <span class="action-icon action-icon--bolt"></span>
        </button>
      </section>

      <aside class="build-dock" aria-label="建造">
        <button class="tower is-active" data-tower="spark" title="星光电塔">
          <span class="tower__icon tower__icon--spark"></span><b>70</b>
        </button>
        <button class="tower" data-tower="frost" title="冰晶塔">
          <span class="tower__icon tower__icon--frost"></span><b>95</b>
        </button>
        <button class="tower" data-tower="vine" title="藤蔓花坛">
          <span class="tower__icon tower__icon--vine"></span><b>55</b>
        </button>
        <button class="tower" data-tower="cookie" title="饼干炮车">
          <span class="tower__icon tower__icon--cookie"></span><b>125</b>
        </button>
      </aside>

      <section class="reticle" aria-hidden="true"><span></span></section>

      <section id="prompt" class="prompt">点击岛上空地建造炮塔，或切到第一人称自由游玩。</section>

      <section id="joystick" class="joystick" aria-label="移动摇杆">
        <span></span>
      </section>

      <section id="lookPad" class="look-pad" aria-label="视角转动"></section>

      <section id="quizOverlay" class="quiz-overlay" hidden>
        <div class="quiz-card">
          <p id="quizReason">学习补能</p>
          <div class="quiz-card__top">
            <h2 id="quizTitle">答题点亮城堡</h2>
            <span id="quizProgress">1 / 5</span>
          </div>
          <h3 id="quizQuestion"></h3>
          <div id="quizChoices" class="quiz-choices"></div>
          <button id="quizClose">回到乐园</button>
        </div>
      </section>

      <section id="towerMenu" class="tower-menu" hidden>
        <div>
          <small id="towerMenuMeta">Lv.1</small>
          <b id="towerMenuTitle">星光电塔</b>
        </div>
        <button id="towerMenuUpgrade">升级</button>
        <button id="towerMenuSell">回收</button>
        <button id="towerMenuClose">取消</button>
      </section>

      <section id="startCurtain" class="start-curtain">
        <div>
          <span class="start-curtain__badge">STARWISH PARK</span>
          <h1>星愿海岛乐园守护</h1>
          <p>守护城堡、建造炮塔、第一人称探索全岛，坐飞车、开卡丁车、爬山、答题补能。</p>
          <button id="startBtn">进入乐园</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/park-game.js?v=park-3d-20260518-monsters-2"></script>
  </body>
</html>
